<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SignalWave FX — Control Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // If jsdelivr is blocked/unreachable, fall back to unpkg automatically.
  if (typeof window.supabase === 'undefined') {
    document.write('<scr' + 'ipt src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></scr' + 'ipt>');
  }
</script>
<style>
:root{
  --bg:#0A0E14; --bg-panel:#0F141C; --bg-panel-raised:#141A24; --bg-input:#0A0E14;
  --line:#1E2733; --line-bright:#2A3544; --text:#E8ECF1; --text-dim:#8B95A7;
  --text-faint:#566073; --on-air:#FF3B30; --buy:#00D964; --buy-dim:#0A3322;
  --sell:#FF3B5C; --sell-dim:#3A0E18; --amber:#FFB020; --amber-dim:#3A2A0A; --steel:#4A6FFF;
  --font-display:'Archivo Expanded',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 0%, rgba(74,111,255,0.07), transparent 40%), radial-gradient(circle at 85% 100%, rgba(255,59,48,0.05), transparent 40%);pointer-events:none;z-index:0;}
/* scrollbar */
::-webkit-scrollbar{width:10px;height:10px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--line-bright);border-radius:6px;}::-webkit-scrollbar-thumb:hover{background:var(--text-faint);}
/* layout */
#app{display:block;position:relative;z-index:1;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--line);background:rgba(15,20,28,0.7);backdrop-filter:blur(12px);position:sticky;top:0;z-index:20;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--on-air),#B8261E);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:16px;flex-shrink:0;}
.brand-text h2{font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-0.01em;}
.brand-text span{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;}
.air-status{display:flex;align-items:center;gap:9px;background:var(--bg-panel);border:1px solid var(--line);border-radius:100px;padding:8px 16px 8px 12px;}
.air-status .dot{width:8px;height:8px;border-radius:50%;background:var(--on-air);box-shadow:0 0 8px var(--on-air);animation:pulse 1.6s ease-in-out infinite;}
.air-status span{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:0.08em;}
.subscriber-badge{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:var(--bg-panel);border:1px solid var(--line);border-radius:100px;padding:8px 16px;margin-left:12px;}
.main-grid{display:grid;grid-template-columns:380px 1fr;gap:0;min-height:calc(100vh - 75px);}
/* composer */
.composer{border-right:1px solid var(--line);padding:28px;position:sticky;top:75px;align-self:start;max-height:calc(100vh - 75px);overflow-y:auto;}
.composer-head{margin-bottom:22px;}
.eyebrow{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--steel);letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.eyebrow::before{content:'●';font-size:8px;}
.composer-head h3{font-family:var(--font-display);font-weight:800;font-size:21px;}
.composer-head p{color:var(--text-dim);font-size:13px;margin-top:6px;line-height:1.5;}
.form-row{margin-bottom:18px;}
.form-row label{font-size:11.5px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;display:block;}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg-input);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font-mono);font-size:14.5px;transition:border-color 0.15s;}
.form-row textarea{font-family:var(--font-body);font-size:13.5px;resize:vertical;min-height:70px;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--steel);}
.direction-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dir-btn{padding:13px;border-radius:10px;border:1.5px solid var(--line);background:var(--bg-input);color:var(--text-dim);font-family:var(--font-body);font-weight:700;font-size:13.5px;letter-spacing:0.03em;cursor:pointer;transition:all 0.15s;text-align:center;}
.dir-btn.active.buy{background:var(--buy-dim);border-color:var(--buy);color:var(--buy);} .dir-btn.active.sell{background:var(--sell-dim);border-color:var(--sell);color:var(--sell);}
.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.publish-btn{width:100%;background:var(--on-air);color:#fff;border:none;border-radius:10px;padding:15px;font-family:var(--font-body);font-weight:700;font-size:14.5px;letter-spacing:0.02em;cursor:pointer;margin-top:6px;transition:background 0.15s, transform 0.1s;display:flex;align-items:center;justify-content:center;gap:8px;}
.composer-divider{height:1px;background:var(--line);margin:30px 0 24px;}
.board-area{padding:28px 32px;}
.board-tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid var(--line);}
.board-tab{background:none;border:none;color:var(--text-dim);font-family:var(--font-body);font-weight:700;font-size:14px;padding:12px 4px;margin-right:24px;cursor:pointer;position:relative;display:flex;align-items:center;gap:9px;}
.board-tab .count{background:var(--bg-panel-raised);border:1px solid var(--line);color:var(--text-dim);font-family:var(--font-mono);font-size:11.5px;padding:2px 8px;border-radius:100px;}
.signal-list{display:flex;flex-direction:column;gap:12px;}
.signal-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;display:flex;align-items:center;gap:20px;transition:border-color 0.15s;}
.sig-dir{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.toast{position:fixed;bottom:28px;right:28px;background:var(--bg-panel-raised);border:1px solid var(--line-bright);border-radius:12px;padding:14px 20px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:10px;transform:translateY(20px);opacity:0;transition:all 0.25s ease;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.toast.show{transform:translateY(0);opacity:1;}
.toast .dot{width:7px;height:7px;border-radius:50%;background:var(--buy);}
.toast.error .dot{background:var(--sell);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}@media (max-width:900px){.main-grid{grid-template-columns:1fr;} .composer{position:static;border-right:none;border-bottom:1px solid var(--line);max-height:none;} .signal-card{flex-wrap:wrap;} .sig-prices{flex-wrap:wrap;gap:14px;}}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">SW</div>
      <div class="brand-text"><h2>SignalWave FX</h2><span>Control Room</span></div>
    </div>
    <div class="air-status"><div class="dot"></div><span>BROADCASTING LIVE</span></div>
    <div class="subscriber-badge" id="subscriber-badge">— subscribers</div>
  </div>

  <div class="main-grid">
    <div class="composer">
      <div class="composer-head">
        <div class="eyebrow">New transmission</div>
        <h3>Publish a signal</h3>
        <p>Goes live on the visitor channel instantly under Active Signals.</p>
      </div>

      <form id="signal-form">
        <div class="form-row"><label>Currency pair</label><input type="text" id="f-pair" placeholder="EUR/USD" required autocomplete="off"></div>

        <div class="form-row"><label>Direction</label>
          <div class="direction-toggle">
            <button type="button" class="dir-btn buy active" data-dir="BUY">▲ BUY</button>
            <button type="button" class="dir-btn sell" data-dir="SELL">▼ SELL</button>
          </div>
        </div>

        <div class="price-grid">
          <div class="form-row"><label>Entry</label><input type="number" step="any" id="f-entry" placeholder="1.0850" required></div>
          <div class="form-row"><label>Stop loss</label><input type="number" step="any" id="f-sl" placeholder="1.0810" required></div>
          <div class="form-row"><label>Take profit</label><input type="number" step="any" id="f-tp" placeholder="1.0930" required></div>
        </div>

        <div class="form-row"><label>Notes (optional)</label><textarea id="f-notes" placeholder="Brief rationale, key levels, session context..."></textarea></div>

        <button type="submit" class="publish-btn" id="publish-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
          Publish signal
        </button>
      </form>

      <div class="composer-divider"></div>

      <div class="composer-head">
        <div class="eyebrow" style="color:var(--steel)">Newsroom</div>
        <h3>Post market news</h3>
        <p>Appears in the visitor channel's news feed.</p>
      </div>

      <form id="news-form" class="news-form">
        <div class="form-row"><label>Headline</label><input type="text" id="n-title" placeholder="Fed holds rates steady" required></div>
        <div class="form-row"><label>Body</label><textarea id="n-body" placeholder="Short update for the news feed..." required></textarea></div>
        <button type="submit" class="publish-btn news-publish">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M19 4H5a1 1 0 00-1 1v14a1 1 0 001 1h14a1 1 0 001-1V5a1 1 0 00-1-1z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>
          Post to newsroom
        </button>
      </form>
    </div>

    <div class="board-area">
      <div class="board-tabs">
        <button class="board-tab active" data-tab="active">On air <span class="count" id="active-count">0</span></button>
        <button class="board-tab" data-tab="archive">Archive <span class="count" id="archive-count">0</span></button>
      </div>

      <div class="signal-list" id="active-list"></div>
      <div class="signal-list" id="archive-list" style="display:none;"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="dot"></div><span id="toast-text"></span></div>

<script>
/* CONFIG */
const SUPABASE_URL = 'https://duwjfcoccovuyefapwwww.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_aO52yL9uZ0VN87bzMh8m7A_YZ0FfqUN';
const SEND_SIGNAL_EMAIL_URL = 'https://duwjfcoccovuyefapwww.supabase.co/functions/v1/send-signal-email';
const SEND_SIGNAL_EMAIL_BEARER = 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1d2pmY29jY292dXllZmFwd3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE3ODE3MDgsImV4cCI6MjA1NzM1NzcwOH0.KIDLxRG_JT5EzTiNat6mZ4E92x5J5UZYRVYTI5wZhZ0';

const sb = (SUPABASE_URL.startsWith('http') && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

function showToast(msg, isError=false){
  const t = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

if (SUPABASE_URL.startsWith('http') && !window.supabase) {
  console.error('Supabase library failed to load from the CDN. Check your internet connection or whether something is blocking the CDN.');
  window.addEventListener('DOMContentLoaded', () => {
    showToast('Could not load required scripts. Check your internet connection or refresh.', true);
  });
}

function initApp(){
  if (sb) {
    loadSignals();
    loadSubscriberCount();
    subscribeRealtime();
  } else {
    showToast('Supabase is not configured — signals will not load or save.', true);
  }
}
initApp();

async function loadSubscriberCount(){
  const { data, error } = await sb.rpc('get_subscriber_count');
  const badge = document.getElementById('subscriber-badge');
  if (error || data === null || data === undefined) {
    badge.textContent = '— subscribers';
    return;
  }
  badge.textContent = `${data} subscriber${data === 1 ? '' : 's'}`;
}

/* DIRECTION TOGGLE */
let currentDirection = 'BUY';
document.querySelectorAll('.dir-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.dir-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentDirection = btn.dataset.dir;
  });
});

/* PUBLISH SIGNAL */
document.getElementById('signal-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  if (!sb) { showToast('Configure Supabase URL + anon key first.', true); return; }

  const btn = document.getElementById('publish-btn');
  btn.disabled = true;

  const payload = {
    pair: document.getElementById('f-pair').value.trim().toUpperCase(),
    direction: currentDirection,
    entry: parseFloat(document.getElementById('f-entry').value),
    stop_loss: parseFloat(document.getElementById('f-sl').value),
    take_profit: parseFloat(document.getElementById('f-tp').value),
    notes: document.getElementById('f-notes').value.trim() || null,
    status: 'active'
  };

  const { error } = await sb.from('signals').insert(payload);
  if (error) {
    btn.disabled = false;
    showToast('Failed to publish: ' + error.message, true);
    return;
  }

  let emailError = null;
  try {
    // Preferred: use Supabase client functions.invoke (handles auth headers).
    if (sb && sb.functions && typeof sb.functions.invoke === 'function') {
      const { data, error: fnErr } = await sb.functions.invoke('send-signal-email', { body: payload });
      if (fnErr) emailError = fnErr.message || JSON.stringify(fnErr);
    } else {
      // Fallback to direct fetch. Note: server must allow CORS (OPTIONS + Access-Control-Allow-Origin).
      const res = await fetch(SEND_SIGNAL_EMAIL_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': SEND_SIGNAL_EMAIL_BEARER
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        const body = await res.text().catch(()=>'<unreadable body>');
        emailError = `Email webhook failed (${res.status}): ${body}`;
      }
    }
  } catch (err) {
    emailError = err && err.message ? err.message : String(err);
  }

  btn.disabled = false;

  if (emailError) {
    if (/Access-Control-Allow-Origin/.test(emailError) || /CORS/i.test(emailError) || /preflight/i.test(emailError)) {
      showToast('Published but email send failed: CORS blocked. Enable CORS for send-signal-email (respond to OPTIONS and set Access-Control-Allow-Origin).', true);
    } else {
      showToast('Published but email send failed: ' + emailError, true);
    }
  } else {
    showToast('Signal published — email sent immediately.');
  }

  e.target.reset();
  document.querySelectorAll('.dir-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.dir-btn.buy').classList.add('active');
  currentDirection = 'BUY';
  loadSignals();
});

/* POST NEWS */
document.getElementById('news-form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  if (!sb) { showToast('Configure Supabase URL + anon key first.', true); return; }

  const payload = {
    title: document.getElementById('n-title').value.trim(),
    body: document.getElementById('n-body').value.trim()
  };

  const { error } = await sb.from('news').insert(payload);
  if (error) { showToast('Failed to post: ' + error.message, true); return; }

  showToast('Posted to the newsroom feed.');
  e.target.reset();
});

/* LOAD + RENDER SIGNALS */
let allSignals = [];

async function loadSignals(){
  if (!sb) return;
  const { data, error } = await sb.from('signals').select('*').order('created_at', { ascending:false });
  if (error) { showToast('Failed to load signals: ' + error.message, true); return; }
  allSignals = data || [];
  renderBoards();
}

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function dirIcon(dir){
  return dir === 'BUY'
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>';
}

function signalCard(s){
  const isArchived = s.status === 'archived';
  const actionBtn = isArchived
    ? `<button class="act-btn restore" data-id="${s.id}" data-action="restore" title="Move back to active">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
       </button>`
    : `<button class="act-btn archive" data-id="${s.id}" data-action="archive" title="Move to archive">
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8v13H3V8M1 3h22v5H1zM10 12h4"/></svg>
       </button>`;

  return `
  <div class="signal-card ${isArchived ? 'is-archived':''}">
    <div class="sig-dir ${s.direction}">${dirIcon(s.direction)}</div>
    <div class="sig-main">
      <div class="sig-pair-row">
        <span class="sig-pair">${s.pair}</span>
        <span class="sig-badge ${s.direction}">${s.direction}</span>
        <span class="sig-time">${fmtTime(s.created_at)}</span>
      </div>
      <div class="sig-prices">
        <div><span class="pl">Entry</span><span class="pv">${s.entry}</span></div>
        <div><span class="pl">Stop loss</span><span class="pv sl">${s.stop_loss}</span></div>
        <div><span class="pl">Take profit</span><span class="pv tp">${s.take_profit}</span></div>
      </div>
      ${s.notes ? `<div class="sig-notes">${escapeHtml(s.notes)}</div>` : ''}
    </div>
    <div class="sig-actions">
      ${actionBtn}
      <button class="act-btn delete" data-id="${s.id}" data-action="delete" title="Delete permanently">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 011-1h6a1 1 0 011 1v2m3 0l-1 14a1 1 0 01-1 1H6a1 1 0 01-1-1L4 6"/></svg>
      </button>
    </div>
  </div>`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function emptyState(label){
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <p>${label}</p>
  </div>`;
}

function renderBoards(){
  const active = allSignals.filter(s=>s.status==='active');
  const archived = allSignals.filter(s=>s.status==='archived');

  document.getElementById('active-count').textContent = active.length;
  document.getElementById('archive-count').textContent = archived.length;

  document.getElementById('active-list').innerHTML = active.length
    ? active.map(signalCard).join('')
    : emptyState('No active signals yet. Publish one from the left panel.');

  document.getElementById('archive-list').innerHTML = archived.length
    ? archived.map(signalCard).join('')
    : emptyState('No archived signals yet.');

  document.querySelectorAll('.act-btn').forEach(btn=>{
    btn.addEventListener('click', handleSignalAction);
  });
}

async function handleSignalAction(e){
  const id = e.currentTarget.dataset.id;
  const action = e.currentTarget.dataset.action;

  if (action === 'delete') {
    if (!confirm('Delete this signal permanently? This cannot be undone.')) return;
    const { error } = await sb.from('signals').delete().eq('id', id);
    if (error) { showToast('Delete failed: ' + error.message, true); return; }
    showToast('Signal deleted.');
  } else if (action === 'archive') {
    const { error } = await sb.from('signals').update({ status:'archived', archived_at: new Date().toISOString() }).eq('id', id);
    if (error) { showToast('Archive failed: ' + error.message, true); return; }
    showToast('Moved to archive.');
  } else if (action === 'restore') {
    const { error } = await sb.from('signals').update({ status:'active', archived_at:null }).eq('id', id);
    if (error) { showToast('Restore failed: ' + error.message, true); return; }
    showToast('Restored to active.');
  }
  loadSignals();
}

/* TABS */
document.querySelectorAll('.board-tab').forEach(tab=>{
  tab.addEventListener('click', ()=>{
    document.querySelectorAll('.board-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('active-list').style.display = target==='active' ? 'flex' : 'none';
    document.getElementById('archive-list').style.display = target==='archive' ? 'flex' : 'none';
  });
});

/* REALTIME */
function subscribeRealtime(){
  sb.channel('admin-signals')
    .on('postgres_changes', { event:'*', schema:'public', table:'signals' }, ()=>{ loadSignals(); })
    .subscribe();
}
</script>
</body>
</html>
